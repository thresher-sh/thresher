# Lima VM template for Thresher.
# Resource values (cpus, memory, disk) are placeholders — they are overridden
# by CLI flags passed to `limactl create`.

vmType: "vz"

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

cpus: 4
memory: "8GiB"
disk: "30GiB"

plain: true

# NOTE: hostResolver.hosts is NOT used here. There is a known Lima bug
# with vmType: "vz" where configuring TLD entries in hostResolver.hosts
# breaks DNS resolution for ALL other domains under those TLDs during
# boot, causing cloud-init to hang indefinitely.
# See: https://github.com/lima-vm/lima/issues/2939
#
# DNS egress control is enforced by iptables in vm_scripts/firewall.sh
# (Layer 3 of the network hardening spec). The firewall pins DNS to
# the host gateway and whitelists only approved destination IPs.

mounts: []

portForwards: []

networks: []
