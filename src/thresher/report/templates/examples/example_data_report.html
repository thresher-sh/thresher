<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thresher — Security Scan Report</title>
<link rel="icon" type="image/png" href="favicon-purple-black.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --deep-black: #0a0a0a;
    --terminal-black: #1a1a1a;
    --charcoal: #2a2a2a;
    --steel: #6b7280;
    --bone: #e5e5e5;
    --white: #fafafa;
    --arctic: #f0f9ff;
    --violet: #a78bfa;
    --violet-dim: rgba(167, 139, 250, 0.15);
    --violet-glow: rgba(167, 139, 250, 0.08);
    --threat-red: #ef4444;
    --safe-green: #22c55e;
    --amber: #f59e0b;
    --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    --sans: 'Inter', -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--deep-black);
    color: var(--bone);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.7;
  }

  a { color: var(--violet); text-decoration: none; transition: color 0.15s; }
  a:hover { color: var(--arctic); }

  /* -- Nav ------------------------------------------------- */
  nav {
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 100;
    background: rgba(10, 10, 10, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--charcoal);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-back {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--steel);
    text-decoration: none;
    transition: color 0.15s;
  }
  .nav-back:hover { color: var(--arctic); }

  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }
  .nav-links a {
    color: var(--steel);
    text-decoration: none;
    font-size: 13px;
    transition: color 0.15s;
  }
  .nav-links a:hover { color: var(--arctic); }

  /* -- Layout ---------------------------------------------- */
  .container {
    max-width: 1080px;
    margin: 0 auto;
    padding: 100px 24px 80px;
  }

  .section {
    margin-bottom: 80px;
  }

  .section-title {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    color: var(--violet);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 16px;
  }

  .section h2 {
    font-family: var(--mono);
    font-size: clamp(20px, 3vw, 28px);
    font-weight: 700;
    color: var(--arctic);
    letter-spacing: -0.5px;
    margin-bottom: 24px;
  }

  /* -- Hero ------------------------------------------------ */
  .report-hero {
    padding: 40px 0 60px;
    border-bottom: 1px solid var(--charcoal);
    margin-bottom: 60px;
  }

  .report-hero .meta {
    font-size: 12px;
    color: var(--steel);
    margin-bottom: 12px;
  }

  .report-hero h1 {
    font-family: var(--mono);
    font-size: clamp(24px, 4vw, 40px);
    font-weight: 700;
    color: var(--arctic);
    letter-spacing: -1px;
    margin-bottom: 8px;
  }

  .report-hero .subtitle {
    font-size: 14px;
    color: var(--steel);
    margin-bottom: 32px;
  }

  .verdict-box {
    display: inline-block;
    border: 2px solid var(--threat-red);
    background: rgba(239, 68, 68, 0.08);
    padding: 16px 32px;
    border-radius: 8px;
    margin-bottom: 32px;
  }

  .verdict-label {
    font-size: 11px;
    color: var(--steel);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .verdict-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--threat-red);
    letter-spacing: 2px;
  }

  .summary-counts {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    font-size: 14px;
    font-weight: 600;
  }

  .count-crit { color: var(--threat-red); }
  .count-high { color: var(--amber); }
  .count-med { color: var(--steel); }
  .count-low { color: #4b5563; }

  /* -- Prose ----------------------------------------------- */
  .prose {
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.8;
    color: var(--bone);
    max-width: 780px;
  }

  .prose p { margin-bottom: 16px; }

  .prose strong { color: var(--arctic); }

  .verdict-callout {
    border-left: 3px solid var(--threat-red);
    background: rgba(239, 68, 68, 0.06);
    padding: 16px 20px;
    border-radius: 0 6px 6px 0;
    margin: 24px 0;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--threat-red);
  }

  .mitigations {
    list-style: none;
    padding: 0;
  }
  .mitigations li {
    padding: 8px 0;
    padding-left: 20px;
    position: relative;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--bone);
  }
  .mitigations li::before {
    content: '>';
    position: absolute;
    left: 0;
    color: var(--violet);
    font-weight: 700;
  }

  /* -- Findings Bar ---------------------------------------- */
  .findings-bar-section {
    margin-bottom: 60px;
  }

  .bar-track {
    display: flex;
    height: 36px;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 8px;
    border: 1px solid var(--charcoal);
  }

  .bar-segment {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--deep-black);
    white-space: nowrap;
    padding: 0 8px;
    min-width: 40px;
  }

  .bar-label {
    font-size: 12px;
    color: var(--steel);
    margin-bottom: 10px;
  }

  /* -- Table ----------------------------------------------- */
  .findings-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-bottom: 8px;
  }

  .findings-table thead th {
    text-align: left;
    padding: 10px 12px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--steel);
    border-bottom: 1px solid var(--charcoal);
    font-weight: 600;
  }

  .findings-table tbody td {
    padding: 12px 12px;
    border-bottom: 1px solid rgba(42, 42, 42, 0.5);
    vertical-align: top;
  }

  .findings-table tbody tr:hover {
    background: rgba(167, 139, 250, 0.03);
  }

  .sev-crit {
    color: var(--threat-red);
    font-weight: 700;
  }
  .sev-high {
    color: var(--amber);
    font-weight: 700;
  }
  .sev-med {
    color: var(--steel);
    font-weight: 600;
  }

  .cve-tag {
    font-size: 12px;
    color: var(--steel);
  }

  .cvss-tag {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 3px;
    display: inline-block;
  }

  .cvss-crit { background: rgba(239, 68, 68, 0.15); color: var(--threat-red); }
  .cvss-high { background: rgba(245, 158, 11, 0.15); color: var(--amber); }
  .cvss-med  { background: rgba(107, 114, 128, 0.15); color: var(--steel); }

  /* -- Details / Collapsible ------------------------------- */
  details {
    border: 1px solid var(--charcoal);
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  details:hover {
    border-color: #3a3a3a;
  }

  details[open] {
    border-color: var(--charcoal);
  }

  summary {
    padding: 16px 20px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--arctic);
    background: var(--terminal-black);
    list-style: none;
    display: flex;
    align-items: center;
    gap: 12px;
    user-select: none;
  }

  summary::-webkit-details-marker { display: none; }

  summary::before {
    content: '+';
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    font-size: 14px;
    font-weight: 700;
    color: var(--violet);
    border: 1px solid var(--charcoal);
    border-radius: 4px;
  }

  details[open] > summary::before {
    content: '-';
  }

  .details-body {
    padding: 20px;
    font-size: 13px;
    line-height: 1.7;
    background: var(--deep-black);
  }

  /* -- AI Finding Cards ------------------------------------ */
  .ai-section {
    border-left: 3px solid var(--violet);
    padding-left: 0;
  }

  .ai-card {
    background: var(--terminal-black);
    border: 1px solid var(--charcoal);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .ai-card:hover {
    border-color: rgba(167, 139, 250, 0.3);
  }

  .ai-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .ai-card-title {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    color: var(--arctic);
    flex: 1;
    min-width: 200px;
  }

  .ai-card-sev {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px 12px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .ai-card-sev.crit {
    background: rgba(239, 68, 68, 0.15);
    color: var(--threat-red);
  }

  .ai-card-sev.high {
    background: rgba(245, 158, 11, 0.15);
    color: var(--amber);
  }

  .ai-card-sev.med {
    background: rgba(107, 114, 128, 0.15);
    color: var(--steel);
  }

  .ai-card-file {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--violet);
    margin-bottom: 10px;
    word-break: break-all;
  }

  .ai-card-desc {
    font-family: var(--sans);
    font-size: 14px;
    color: var(--bone);
    line-height: 1.7;
    margin-bottom: 12px;
  }

  .ai-card-meta {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--steel);
  }

  .confidence-bar {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .confidence-fill {
    width: 60px;
    height: 4px;
    background: var(--charcoal);
    border-radius: 2px;
    overflow: hidden;
    display: inline-block;
    position: relative;
  }

  .confidence-fill span {
    display: block;
    height: 100%;
    background: var(--violet);
    border-radius: 2px;
  }

  .analyst-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .analyst-tag {
    font-size: 10px;
    font-weight: 600;
    color: var(--violet);
    background: var(--violet-dim);
    padding: 2px 8px;
    border-radius: 3px;
    letter-spacing: 0.3px;
  }

  /* -- Upgrade Table --------------------------------------- */
  .upgrade-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .upgrade-table thead th {
    text-align: left;
    padding: 10px 12px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--steel);
    border-bottom: 1px solid var(--charcoal);
    font-weight: 600;
  }

  .upgrade-table tbody td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(42, 42, 42, 0.5);
    vertical-align: top;
  }

  .upgrade-table tbody tr:hover {
    background: rgba(167, 139, 250, 0.03);
  }

  .pkg-name {
    color: var(--arctic);
    font-weight: 600;
  }

  .ver-old { color: var(--threat-red); }
  .ver-new { color: var(--safe-green); }

  /* -- Trust Assessment ------------------------------------ */
  .trust-items {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 12px;
  }

  .trust-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: var(--terminal-black);
    border: 1px solid var(--charcoal);
    border-radius: 6px;
    font-size: 13px;
    color: var(--bone);
  }

  .trust-icon {
    font-size: 16px;
    width: 24px;
    text-align: center;
    flex-shrink: 0;
    color: var(--threat-red);
  }

  /* -- PR / What Was Fixed --------------------------------- */
  .fix-card {
    background: var(--terminal-black);
    border: 1px solid var(--safe-green);
    border-radius: 8px;
    padding: 28px;
  }

  .fix-card h3 {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 700;
    color: var(--safe-green);
    margin-bottom: 12px;
  }

  .fix-card p {
    font-family: var(--sans);
    font-size: 14px;
    color: var(--bone);
    line-height: 1.7;
    margin-bottom: 16px;
  }

  .fix-list {
    list-style: none;
    padding: 0;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 6px;
  }

  .fix-list li {
    font-size: 13px;
    color: var(--bone);
    padding: 4px 0 4px 18px;
    position: relative;
  }

  .fix-list li::before {
    content: '\2713';
    position: absolute;
    left: 0;
    color: var(--safe-green);
    font-weight: 700;
  }

  /* -- Pipeline -------------------------------------------- */
  .pipeline-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px;
  }

  .pipeline-item {
    font-size: 12px;
    padding: 8px 12px;
    background: var(--terminal-black);
    border: 1px solid var(--charcoal);
    border-radius: 4px;
    color: var(--bone);
  }

  .pipeline-item.ai {
    border-color: rgba(167, 139, 250, 0.3);
    color: var(--violet);
  }

  /* -- CTA Footer ------------------------------------------ */
  .cta-section {
    text-align: center;
    padding: 80px 24px;
    border-top: 1px solid var(--charcoal);
    position: relative;
  }

  .cta-section::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 300px;
    background: radial-gradient(ellipse, var(--violet-glow) 0%, transparent 70%);
    pointer-events: none;
  }

  .cta-ascii {
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.25;
    color: var(--violet);
    white-space: pre;
    margin-bottom: 32px;
    opacity: 0.5;
    position: relative;
    z-index: 1;
  }

  .cta-section h2 {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 700;
    color: var(--arctic);
    margin-bottom: 32px;
    position: relative;
    z-index: 1;
  }

  .install-box {
    background: var(--terminal-black);
    border: 1px solid var(--violet);
    border-radius: 8px;
    padding: 20px 40px;
    display: inline-flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    transition: box-shadow 0.3s, border-color 0.3s;
    position: relative;
    z-index: 1;
  }

  .install-box:hover {
    box-shadow: 0 0 40px var(--violet-glow), 0 0 80px rgba(167, 139, 250, 0.05);
  }

  .install-box .prompt { color: var(--steel); user-select: none; }
  .install-box .cmd {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 500;
    color: var(--arctic);
  }
  .install-box .cmd .domain { color: var(--violet); }

  .copy-tooltip {
    position: absolute;
    right: -80px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--violet);
    color: var(--deep-black);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 5px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s, transform 0.15s;
    transform: translateY(-50%) translateX(4px);
  }

  .copy-tooltip::before {
    content: '';
    position: absolute;
    left: -5px;
    top: 50%;
    transform: translateY(-50%);
    border: 5px solid transparent;
    border-right-color: var(--violet);
    border-left: 0;
  }

  .copy-tooltip.show {
    opacity: 1;
    transform: translateY(-50%) translateX(0);
  }

  footer {
    border-top: 1px solid var(--charcoal);
    padding: 40px 24px;
    text-align: center;
    color: var(--steel);
    font-size: 12px;
  }

  footer a {
    color: var(--arctic);
    text-decoration: none;
    transition: color 0.15s;
  }
  footer a:hover { color: var(--violet); }

  /* -- Scrollbar ------------------------------------------- */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--deep-black); }
  ::-webkit-scrollbar-thumb { background: var(--charcoal); border-radius: 3px; }

  /* -- Responsive ------------------------------------------ */
  @media (max-width: 768px) {
    .container { padding: 80px 16px 60px; }
    .summary-counts { gap: 12px; }
    .ai-card-header { flex-direction: column; }
    .trust-items { grid-template-columns: 1fr; }
    .fix-list { grid-template-columns: 1fr; }
    .nav-links { display: none; }
    .findings-table { font-size: 12px; }
    .findings-table thead th,
    .findings-table tbody td { padding: 8px 6px; }
    .upgrade-table { font-size: 12px; }
    .upgrade-table thead th,
    .upgrade-table tbody td { padding: 8px 6px; }
    .install-box { padding: 16px 20px; }
    .install-box .cmd { font-size: 13px; }
    .copy-tooltip {
      right: auto;
      left: 50%;
      top: -36px;
      transform: translateX(-50%);
    }
    .copy-tooltip::before {
      left: 50%;
      top: auto;
      bottom: -5px;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: var(--violet);
      border-bottom: 0;
    }
    .copy-tooltip.show {
      transform: translateX(-50%) translateY(0);
    }
  }

  @media (max-width: 480px) {
    .bar-segment { font-size: 9px; min-width: 30px; }
    .pipeline-grid { grid-template-columns: 1fr; }
  }

  /* -- Table horizontal scroll ----------------------------- */
  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
</style>
</head>

// ---------------------------------------------------------------------------
// Helper
// ---------------------------------------------------------------------------
function sevClass(sev) {
  return { critical: 'crit', high: 'high', medium: 'med', low: 'low' }[sev] || '';
}

// ---------------------------------------------------------------------------
// Component functions
// ---------------------------------------------------------------------------

function renderNav(d) {
  if (!d || !d.meta) return '';
  return '<nav>' +
    '<a href="index.html" class="nav-back">&larr; Back to thresher.sh</a>' +
    '<ul class="nav-links">' +
      '<li><a href="#executive-summary">Summary</a></li>' +
      '<li><a href="#scanner-findings">Scanners</a></li>' +
      '<li><a href="#ai-findings">AI Findings</a></li>' +
      '<li><a href="#upgrades">Upgrades</a></li>' +
      '<li><a href="#fixed">What Was Fixed</a></li>' +
      '<li><a href="https://github.com/thresher-sh/thresher">GitHub</a></li>' +
    '</ul>' +
  '</nav>';
}

function renderHero(d) {
  if (!d || !d.meta) return '';
  var m = d.meta;
  var v = d.verdict || {};
  var c = d.counts || {};
  var borderColor = v.severity === 'critical' ? 'var(--threat-red)' :
                    v.severity === 'high' ? 'var(--amber)' :
                    v.severity === 'medium' ? 'var(--steel)' : 'var(--charcoal)';
  var textColor = borderColor;
  var bgColor = v.severity === 'critical' ? 'rgba(239, 68, 68, 0.08)' :
                v.severity === 'high' ? 'rgba(245, 158, 11, 0.08)' :
                v.severity === 'medium' ? 'rgba(107, 114, 128, 0.08)' : 'rgba(42, 42, 42, 0.08)';

  return '<div class="report-hero">' +
    '<div class="meta">SCAN DATE: ' + m.scan_date + ' &middot; THRESHER ' + m.version + ' &middot; ' + m.scanners + ' scanners + ' + m.analysts + ' AI analysts</div>' +
    '<h1>' + m.repo + '</h1>' +
    '<p class="subtitle">Security Scan Report</p>' +
    '<div class="verdict-box" style="border-color: ' + borderColor + '; background: ' + bgColor + ';">' +
      '<div class="verdict-label">Verdict</div>' +
      '<div class="verdict-value" style="color: ' + textColor + ';">' + (v.text || '') + '</div>' +
    '</div>' +
    '<div style="margin-top: 24px;">' +
      '<div class="summary-counts">' +
        '<span class="count-crit">' + c.critical + ' Critical</span>' +
        '<span class="count-high">' + c.high_scanner + ' High (scanner) + ' + c.high_ai + ' High (AI)</span>' +
        '<span class="count-med">' + c.medium + ' Medium</span>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function renderExecSummary(d) {
  if (!d || !d.executive_summary) return '';
  var v = d.verdict || {};
  var mits = d.mitigations || [];
  var mitItems = '';
  for (var i = 0; i < mits.length; i++) {
    mitItems += '<li>' + mits[i] + '</li>';
  }
  return '<div class="section" id="executive-summary">' +
    '<div class="section-title">// Executive Summary</div>' +
    '<div class="prose">' + d.executive_summary + '</div>' +
    '<div class="verdict-callout">' + (v.callout || '') + '</div>' +
    '<div style="margin-top: 24px;">' +
      '<div class="section-title" style="margin-bottom: 12px;">Required Mitigations</div>' +
      '<ul class="mitigations">' + mitItems + '</ul>' +
    '</div>' +
  '</div>';
}

function renderFindingsBar(d) {
  if (!d || !d.counts) return '';
  var c = d.counts;
  var p0Val = parseInt(c.p0, 10) || 0;
  var scannerCrit = parseInt(c.scanner_crit, 10) || 0;
  var highScanner = parseInt(c.high_scanner, 10) || 0;
  var med = parseInt(c.medium, 10) || 0;
  var low = parseInt(c.low, 10) || 0;
  var aiCrit = parseInt(c.ai_crit, 10) || 0;
  var aiHigh = parseInt(c.ai_high, 10) || 0;
  var aiMed = parseInt(c.ai_med, 10) || 0;
  var aiLow = parseInt(c.ai_low, 10) || 0;

  // Scanner bar
  var scannerBar = '<div class="bar-label">' + c.total_scanner + ' scanner findings</div>' +
    '<div class="bar-track">';
  if (p0Val === 0) {
    scannerBar += '<div class="bar-segment" style="flex: 0; min-width: 48px; background: var(--charcoal); color: var(--steel);">P0: ' + c.p0 + '</div>';
  } else {
    scannerBar += '<div class="bar-segment" style="flex: ' + p0Val + '; background: #fff; color: var(--deep-black);">P0: ' + c.p0 + '</div>';
  }
  scannerBar += '<div class="bar-segment" style="flex: ' + scannerCrit + '; background: var(--threat-red);">CRIT: ' + c.scanner_crit + '</div>';
  scannerBar += '<div class="bar-segment" style="flex: ' + highScanner + '; background: var(--amber);">HIGH: ' + c.high_scanner + '</div>';
  scannerBar += '<div class="bar-segment" style="flex: ' + med + '; background: var(--steel); color: var(--deep-black);">MED: ' + c.medium + '</div>';
  scannerBar += '<div class="bar-segment" style="flex: ' + (low > 50 ? 50 : low) + '; background: var(--charcoal); color: var(--steel);">LOW: ' + c.low + '</div>';
  scannerBar += '</div>';

  // AI bar
  var aiBar = '<div class="bar-label" style="margin-top: 16px;">' + c.total_ai + ' AI analyst findings</div>' +
    '<div class="bar-track" style="border-color: rgba(167, 139, 250, 0.3);">';
  aiBar += '<div class="bar-segment" style="flex: ' + aiCrit + '; background: var(--threat-red);">CRIT: ' + c.ai_crit + '</div>';
  aiBar += '<div class="bar-segment" style="flex: ' + aiHigh + '; background: var(--amber);">HIGH: ' + c.ai_high + '</div>';
  aiBar += '<div class="bar-segment" style="flex: ' + aiMed + '; background: var(--steel); color: var(--deep-black);">MED: ' + c.ai_med + '</div>';
  aiBar += '<div class="bar-segment" style="flex: ' + aiLow + '; background: var(--charcoal); color: var(--steel);">LOW: ' + c.ai_low + '</div>';
  aiBar += '</div>';

  return '<div class="findings-bar-section">' +
    '<div class="section-title">// Findings Distribution</div>' +
    scannerBar + aiBar +
  '</div>';
}

function renderScannerTable(d) {
  if (!d || !d.scanner_findings || d.scanner_findings.length === 0) return '';
  var rows = '';
  for (var i = 0; i < d.scanner_findings.length; i++) {
    var f = d.scanner_findings[i];
    var sevCls = f.severity === 'critical' ? 'sev-crit' : f.severity === 'high' ? 'sev-high' : 'sev-med';
    var sevLabel = f.severity.charAt(0).toUpperCase() + f.severity.slice(1);
    var cvssCls = f.severity === 'critical' ? 'cvss-crit' : f.severity === 'high' ? 'cvss-high' : 'cvss-med';
    rows += '<tr>' +
      '<td>' + f.rank + '</td>' +
      '<td class="' + sevCls + '">' + sevLabel + '</td>' +
      '<td><span class="pkg-name">' + f.package + '</span> &mdash; ' + f.title + '</td>' +
      '<td class="cve-tag">' + f.cve + '</td>' +
      '<td><span class="cvss-tag ' + cvssCls + '">' + f.cvss + '</span></td>' +
    '</tr>';
  }
  return '<div class="section" id="scanner-findings">' +
    '<div class="section-title">// Scanner Findings</div>' +
    '<h2>Top 10 by severity</h2>' +
    '<div class="table-wrap">' +
      '<table class="findings-table">' +
        '<thead><tr>' +
          '<th>#</th><th>Severity</th><th>Package & Title</th><th>CVE</th><th>CVSS</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +
    '</div>' +
  '</div>';
}

function renderAiFindings(d) {
  if (!d || !d.ai_findings || d.ai_findings.length === 0) return '';

  var critical = [];
  var high = [];
  var medium = [];
  for (var i = 0; i < d.ai_findings.length; i++) {
    var f = d.ai_findings[i];
    if (f.severity === 'critical') critical.push(f);
    else if (f.severity === 'high') high.push(f);
    else if (f.severity === 'medium') medium.push(f);
  }

  function renderFullCard(f) {
    var borderColor = f.severity === 'critical' ? 'var(--threat-red)' : f.severity === 'high' ? 'var(--amber)' : 'var(--steel)';
    var tags = '';
    if (f.analysts) {
      for (var j = 0; j < f.analysts.length; j++) {
        tags += '<span class="analyst-tag">' + f.analysts[j] + '</span>';
      }
    }
    return '<div class="ai-card" style="border-left: 3px solid ' + borderColor + ';">' +
      '<div class="ai-card-header">' +
        '<div class="ai-card-title">' + f.title + '</div>' +
        '<span class="ai-card-sev ' + sevClass(f.severity) + '">' + (f.severity.charAt(0).toUpperCase() + f.severity.slice(1)) + '</span>' +
      '</div>' +
      '<div class="ai-card-file">' + f.file + '</div>' +
      '<div class="ai-card-desc">' + f.description + '</div>' +
      '<div class="ai-card-meta">' +
        '<div class="confidence-bar">' +
          'Confidence: ' + f.confidence + '%' +
          '<div class="confidence-fill"><span style="width: ' + f.confidence + '%;"></span></div>' +
        '</div>' +
        '<div class="analyst-tags">' + tags + '</div>' +
      '</div>' +
    '</div>';
  }

  function renderCompactCard(f) {
    return '<div class="ai-card" style="border-left: 3px solid var(--steel); margin-bottom: 12px;">' +
      '<div class="ai-card-title" style="font-size: 14px; margin-bottom: 6px;">' + f.title + '</div>' +
      '<div class="ai-card-file">' + f.file + '</div>' +
      '<div class="ai-card-meta"><span>Confidence: ' + f.confidence + '%</span></div>' +
    '</div>';
  }

  var html = '<div class="section" id="ai-findings">' +
    '<div class="section-title" style="color: var(--violet);">// What scanners missed</div>' +
    '<h2 style="margin-bottom: 8px;">AI Analyst Findings</h2>' +
    '<p style="color: var(--steel); font-size: 13px; margin-bottom: 32px;">8 AI security analysts examined the codebase for threats that traditional tools can\'t detect.</p>';

  // Critical
  if (critical.length > 0) {
    html += '<div style="margin-bottom: 32px;">' +
      '<div style="font-size: 12px; font-weight: 700; color: var(--threat-red); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; padding-left: 4px;">Critical</div>';
    for (var ci = 0; ci < critical.length; ci++) {
      html += renderFullCard(critical[ci]);
    }
    html += '</div>';
  }

  // High
  if (high.length > 0) {
    html += '<div style="margin-bottom: 32px;">' +
      '<div style="font-size: 12px; font-weight: 700; color: var(--amber); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; padding-left: 4px;">High</div>';
    for (var hi = 0; hi < high.length; hi++) {
      html += renderFullCard(high[hi]);
    }
    html += '</div>';
  }

  // Medium (collapsible)
  if (medium.length > 0) {
    html += '<details>' +
      '<summary><span class="sev-med">Medium</span> &mdash; ' + medium.length + ' findings</summary>' +
      '<div class="details-body">';
    for (var mi = 0; mi < medium.length; mi++) {
      html += renderCompactCard(medium[mi]);
    }
    html += '</div></details>';
  }

  html += '</div>';
  return html;
}

function renderTrustSignals(d) {
  if (!d || !d.trust_signals || d.trust_signals.length === 0) return '';
  var items = '';
  for (var i = 0; i < d.trust_signals.length; i++) {
    items += '<div class="trust-item">' +
      '<span class="trust-icon">!</span>' +
      d.trust_signals[i] +
    '</div>';
  }
  return '<div class="section" id="trust">' +
    '<div class="section-title">// Infrastructure & Trust Assessment</div>' +
    '<h2>Repository health signals</h2>' +
    '<div class="trust-items">' + items + '</div>' +
  '</div>';
}

function renderUpgrades(d) {
  if (!d || !d.dependency_upgrades || d.dependency_upgrades.length === 0) return '';
  var rows = '';
  for (var i = 0; i < d.dependency_upgrades.length; i++) {
    var u = d.dependency_upgrades[i];
    var cvssCls = u.severity === 'critical' ? 'cvss-crit' : u.severity === 'high' ? 'cvss-high' : 'cvss-med';
    rows += '<tr>' +
      '<td class="pkg-name">' + u.package + '</td>' +
      '<td class="ver-old">' + u.previous + '</td>' +
      '<td class="ver-new">' + u.fixed + '</td>' +
      '<td><span class="cvss-tag ' + cvssCls + '">' + u.severity_label + '</span></td>' +
      '<td class="cve-tag">' + u.cves + '</td>' +
    '</tr>';
  }
  return '<div class="section" id="upgrades">' +
    '<div class="section-title">// Dependency Upgrades</div>' +
    '<h2>Remediation path</h2>' +
    '<div class="table-wrap">' +
      '<table class="upgrade-table">' +
        '<thead><tr>' +
          '<th>Package</th><th>Previous</th><th>Fixed</th><th>Severity</th><th>CVEs</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +
    '</div>' +
  '</div>';
}

function renderRemediation(d) {
  if (!d || !d.remediation) return '';
  var r = d.remediation;
  var cfg = d.config || {};
  var hidden = cfg.show_remediation !== 'true';
  var fixItems = '';
  var fixes = r.fix_list || [];
  for (var i = 0; i < fixes.length; i++) {
    fixItems += '<li>' + fixes[i] + '</li>';
  }
  return '<div class="section" id="fixed">' +
    '<div class="section-title">// Remediation</div>' +
    '<h2>What was fixed</h2>' +
    '<div id="remediation-content" style="' + (hidden ? 'display:none;' : '') + '">' +
      '<div class="fix-card">' +
        '<h3>PR #' + r.pr_number + ' &mdash; Security Remediation</h3>' +
        '<p>' + r.summary + '</p>' +
        '<p><a href="' + r.pr_url + '" style="color: var(--safe-green); border-bottom: 1px solid var(--safe-green);">View PR #' + r.pr_number + ' on GitHub &rarr;</a></p>' +
        '<div style="font-size: 12px; font-weight: 700; color: var(--steel); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;">Application Security Fixes</div>' +
        '<ul class="fix-list">' + fixItems + '</ul>' +
      '</div>' +
    '</div>' +
    (hidden ? '<button onclick="toggleRemediation()" id="remediation-toggle" style="margin-top: 12px; padding: 8px 20px; background: var(--terminal-black); border: 1px solid var(--charcoal); border-radius: 6px; color: var(--bone); font-family: var(--mono); font-size: 13px; cursor: pointer;">Show remediation details</button>' : '') +
  '</div>';
}

function renderPipeline(d) {
  if (!d || !d.pipeline) return '';
  var p = d.pipeline;
  var scannerItems = '';
  var scanners = p.scanners || [];
  for (var i = 0; i < scanners.length; i++) {
    scannerItems += '<div class="pipeline-item">' + scanners[i] + '</div>';
  }
  var analystItems = '';
  var analysts = p.analysts || [];
  for (var j = 0; j < analysts.length; j++) {
    analystItems += '<div class="pipeline-item ai">' + analysts[j] + '</div>';
  }
  return '<div class="section" id="pipeline">' +
    '<details>' +
      '<summary>Scan Pipeline Details</summary>' +
      '<div class="details-body">' +
        '<div style="margin-bottom: 24px;">' +
          '<div style="font-size: 12px; font-weight: 700; color: var(--steel); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;">22 Scanners</div>' +
          '<div class="pipeline-grid">' + scannerItems + '</div>' +
        '</div>' +
        '<div style="margin-bottom: 24px;">' +
          '<div style="font-size: 12px; font-weight: 700; color: var(--violet); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;">8 AI Analyst Personas</div>' +
          '<div class="pipeline-grid">' + analystItems + '</div>' +
        '</div>' +
        '<div style="font-size: 13px; color: var(--bone); line-height: 1.8;">' +
          (p.notes || '') +
        '</div>' +
      '</div>' +
    '</details>' +
  '</div>';
}

function renderCta(d) {
  if (!d || !d.config || d.config.show_cta !== 'true') return '';
  return '<section class="cta-section">' +
    '<div class="cta-ascii">                     _/|\n' +
    '              ______/  |\n' +
    '        _____/  __     |\n' +
    '    ___/   \\__/  \\    /\n' +
    '   /    _     \\__/\n' +
    '  | __-~ \\--~\n' +
    '   \\/</div>' +
    '<h2>Run this on your own dependencies.</h2>' +
    '<div class="install-box" onclick="copyCmd(this)" style="margin: 0 auto;">' +
      '<span class="prompt">$</span>' +
      '<span class="cmd">brew tap thresher-sh/thresher && brew install <span class="domain">thresher</span></span>' +
      '<span class="copy-tooltip">copied!</span>' +
    '</div>' +
  '</section>';
}

function renderFooter(d) {
  if (!d) return '';
  return '<footer>' +
    '<p style="margin-bottom: 16px;">' +
      '<a href="https://github.com/thresher-sh/thresher">GitHub</a> &middot; ' +
      '<a href="https://github.com/thresher-sh/thresher/tree/main/documentation">Docs</a> &middot; ' +
      '<a href="https://discord.gg/VVt9qmkcnr">Discord</a> &middot; ' +
      '<a href="index.html">thresher.sh</a>' +
    '</p>' +
    '<p style="max-width: 680px; margin: 0 auto; color: var(--steel); font-size: 11px; line-height: 1.6;">' +
      '<strong>Disclaimer:</strong> Thresher is provided &ldquo;as is&rdquo; without warranty of any kind. It does not guarantee detection of all vulnerabilities, malicious code, or supply chain threats. Results should not be treated as a substitute for professional security audits. Use at your own risk.' +
    '</p>' +
  '</footer>';
}

// ---------------------------------------------------------------------------
// Assembly
// ---------------------------------------------------------------------------
function renderReport(data) {
  document.getElementById('app').innerHTML = [
    renderNav(data),
    '<div class="container">',
    renderHero(data),
    renderExecSummary(data),
    renderFindingsBar(data),
    renderScannerTable(data),
    renderAiFindings(data),
    renderTrustSignals(data),
    renderUpgrades(data),
    renderRemediation(data),
    renderPipeline(data),
    '</div>',
    renderCta(data),
    renderFooter(data),
  ].join('');
}

renderReport(REPORT_DATA);

// ---------------------------------------------------------------------------
// Interactivity
// ---------------------------------------------------------------------------
function copyCmd(el) {
  var cmd = 'brew tap thresher-sh/thresher && brew install thresher';
  navigator.clipboard.writeText(cmd).then(function() {
    var tip = el.querySelector('.copy-tooltip');
    if (!tip) return;
    tip.classList.add('show');
    setTimeout(function() { tip.classList.remove('show'); }, 1500);
  });
}

function toggleRemediation() {
  var content = document.getElementById('remediation-content');
  var btn = document.getElementById('remediation-toggle');
  if (!content || !btn) return;
  if (content.style.display === 'none') {
    content.style.display = '';
    btn.textContent = 'Hide remediation details';
  } else {
    content.style.display = 'none';
    btn.textContent = 'Show remediation details';
  }
}
</script>

</body>
</html>
