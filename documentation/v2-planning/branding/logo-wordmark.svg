<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <!-- Thresher Wordmark — monospace feel, shark blue accent -->

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700');
    </style>
  </defs>

  <!-- Background (transparent by default, add rect for dark bg) -->

  <!-- Tail fin mark before the word -->
  <path d="
    M 30 140
    C 25 130, 15 100, 12 70
    C 10 50, 15 35, 25 30
    C 28 29, 30 32, 29 38
    C 25 55, 24 80, 27 105
    C 30 125, 35 140, 35 145
    Z
  " fill="#38bdf8"/>

  <!-- Lower tail -->
  <path d="
    M 30 140
    C 28 148, 24 158, 22 165
    C 21 168, 23 169, 26 163
    C 29 155, 32 148, 33 142
    Z
  " fill="#38bdf8"/>

  <!-- Wordmark text -->
  <text x="60" y="148" font-family="'JetBrains Mono', 'Fira Code', monospace" font-weight="700" font-size="96" fill="#fafafa" letter-spacing="-2">thresher</text>

  <!-- Subtle underline accent -->
  <line x1="60" y1="162" x2="755" y2="162" stroke="#38bdf8" stroke-width="2" opacity="0.4"/>
</svg>
