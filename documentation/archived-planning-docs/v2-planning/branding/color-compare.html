<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thresher — Accent Color Comparison</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --deep-black: #0a0a0a;
    --terminal-black: #1a1a1a;
    --charcoal: #2a2a2a;
    --steel: #6b7280;
    --bone: #e5e5e5;
    --white: #fafafa;
    --threat-red: #ef4444;
    --safe-green: #22c55e;
    --amber-func: #f59e0b;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--deep-black);
    color: var(--bone);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.7;
    padding: 40px 24px;
  }

  .page-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 8px;
    text-align: center;
  }

  .page-sub {
    color: var(--steel);
    text-align: center;
    margin-bottom: 60px;
    font-size: 13px;
  }

  /* ── Color Option Block ──────────────────────── */
  .color-option {
    max-width: 900px;
    margin: 0 auto 80px;
    border: 1px solid var(--charcoal);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .color-option:hover {
    border-color: var(--steel);
  }

  .color-header {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 24px 32px;
    border-bottom: 1px solid var(--charcoal);
  }

  .color-swatch-large {
    width: 64px;
    height: 64px;
    border-radius: 8px;
    flex-shrink: 0;
  }

  .color-name {
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
  }

  .color-hex {
    font-size: 14px;
    color: var(--steel);
    margin-top: 2px;
  }

  .color-vibe {
    font-size: 12px;
    margin-top: 4px;
  }

  /* ── Sections within each option ─────────────── */
  .color-demos {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .demo-panel {
    padding: 28px 32px;
    border-right: 1px solid var(--charcoal);
  }

  .demo-panel:last-child { border-right: none; }

  .demo-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--steel);
    margin-bottom: 16px;
  }

  /* Install box */
  .demo-install {
    background: var(--terminal-black);
    border-width: 2px;
    border-style: solid;
    border-radius: 6px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .demo-install .prompt { color: var(--steel); }
  .demo-install .cmd { font-size: 15px; font-weight: 500; color: var(--white); }

  /* Wordmark */
  .demo-wordmark {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 4px;
  }

  .demo-tagline {
    font-size: 13px;
    color: var(--steel);
  }

  /* ASCII shark */
  .demo-ascii {
    font-size: 11px;
    line-height: 1.2;
    white-space: pre;
    margin-bottom: 12px;
  }

  /* Findings */
  .demo-findings {
    font-size: 12px;
    line-height: 1.8;
  }

  /* Links */
  .demo-link {
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* Feature cards mini */
  .demo-features {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .demo-feat {
    background: var(--terminal-black);
    border: 1px solid var(--charcoal);
    border-radius: 4px;
    padding: 10px 14px;
    flex: 1;
    text-align: center;
  }

  .demo-feat-num {
    font-size: 24px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }

  .demo-feat-label {
    font-size: 10px;
    color: var(--steel);
  }

  /* Analyst mini cards */
  .demo-analysts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 12px;
  }

  .demo-analyst {
    background: var(--terminal-black);
    border: 1px solid var(--charcoal);
    border-radius: 4px;
    padding: 8px 10px;
    font-size: 11px;
  }

  .demo-analyst-num {
    font-weight: 700;
    font-size: 9px;
    letter-spacing: 1px;
    margin-bottom: 2px;
  }

  .demo-analyst-name {
    color: var(--white);
    font-weight: 600;
    font-size: 11px;
  }

  /* Nav bar preview */
  .demo-nav {
    background: rgba(10, 10, 10, 0.9);
    border: 1px solid var(--charcoal);
    border-radius: 6px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .demo-nav-brand {
    font-weight: 700;
    font-size: 15px;
  }

  .demo-nav-links {
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: var(--steel);
  }

  /* Zone badges */
  .demo-zones {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 12px;
  }

  .demo-zone {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 3px;
    font-weight: 600;
  }

  /* Full-width bottom section */
  .color-bottom {
    padding: 24px 32px;
    border-top: 1px solid var(--charcoal);
  }

  .demo-terminal {
    background: var(--deep-black);
    border: 1px solid var(--charcoal);
    border-radius: 6px;
    overflow: hidden;
  }

  .demo-term-bar {
    background: var(--charcoal);
    padding: 8px 12px;
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .demo-term-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--steel);
    opacity: 0.4;
  }

  .demo-term-title {
    font-size: 11px;
    color: var(--steel);
    margin-left: 6px;
  }

  .demo-term-body {
    padding: 16px 20px;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre;
  }
</style>
</head>
<body>

<div class="page-title">Accent Color Comparison</div>
<p class="page-sub">Each option shown across: wordmark, install box, ASCII art, CLI output, UI elements</p>

<script>
const colors = [
  { name: "Ocean Teal",     hex: "#2dd4bf", vibe: "Deep water, cold, technical" },
  { name: "Electric Cyan",  hex: "#22d3ee", vibe: "Sharper, more bite" },
  { name: "Glacier",        hex: "#7dd3fc", vibe: "Lighter, icy, clean" },
  { name: "Phosphor Green", hex: "#4ade80", vibe: "Terminal green, hacker energy" },
  { name: "Vapor Violet",   hex: "#a78bfa", vibe: "Unexpected, stands out from competitors" },
  { name: "Steel Cyan",     hex: "#67e8f9", vibe: "Muted, clinical, forensic" },
  { name: "Amber Glow",     hex: "#fbbf24", vibe: "Warm, warning-like, high contrast" },
  { name: "Arctic White",   hex: "#f0f9ff", vibe: "Near-white, minimal, almost no color" },
  { name: "Neon Mint",      hex: "#34d399", vibe: "Between green and teal, fresh" },
  { name: "Coral",          hex: "#fb7185", vibe: "Warm, aggressive, high impact" },
];

function dimColor(hex, opacity) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${opacity})`;
}

document.addEventListener('DOMContentLoaded', () => {
  colors.forEach(c => {
    const el = document.createElement('div');
    el.className = 'color-option';
    el.innerHTML = `
      <div class="color-header">
        <div class="color-swatch-large" style="background: ${c.hex};"></div>
        <div>
          <div class="color-name">${c.name}</div>
          <div class="color-hex">${c.hex}</div>
          <div class="color-vibe" style="color: ${c.hex};">${c.vibe}</div>
        </div>
      </div>

      <div class="color-demos">
        <!-- Left: Brand elements -->
        <div class="demo-panel">
          <div class="demo-label">Brand Elements</div>

          <div class="demo-nav">
            <span class="demo-nav-brand" style="color: ${c.hex};">thresher</span>
            <span class="demo-nav-links">Features &nbsp; Docs &nbsp; <span style="color: ${c.hex};">GitHub</span></span>
          </div>

          <div class="demo-wordmark" style="color: ${c.hex};">thresher</div>
          <div class="demo-tagline">Separate the safe from the dangerous.</div>

          <div class="demo-install" style="border-color: ${c.hex};">
            <span class="prompt">$</span>
            <span class="cmd">curl -fsSL <span style="color: ${c.hex};">thresher.sh/install</span> | bash</span>
          </div>

          <div class="demo-features">
            <div class="demo-feat">
              <div class="demo-feat-num" style="color: ${c.hex};">16</div>
              <div class="demo-feat-label">Scanners</div>
            </div>
            <div class="demo-feat">
              <div class="demo-feat-num" style="color: ${c.hex};">8</div>
              <div class="demo-feat-label">Analysts</div>
            </div>
            <div class="demo-feat">
              <div class="demo-feat-num" style="color: ${c.hex};">0</div>
              <div class="demo-feat-label">Trust</div>
            </div>
          </div>

          <div class="demo-analysts">
            <div class="demo-analyst">
              <div class="demo-analyst-num" style="color: ${c.hex};">ANALYST 01</div>
              <div class="demo-analyst-name">The Paranoid</div>
            </div>
            <div class="demo-analyst">
              <div class="demo-analyst-num" style="color: ${c.hex};">ANALYST 08</div>
              <div class="demo-analyst-name">Shadowcatcher</div>
            </div>
          </div>

          <div class="demo-zones">
            <span class="demo-zone" style="background: ${dimColor(c.hex, 0.15)}; color: ${c.hex};">5 scanners</span>
            <span class="demo-zone" style="background: ${dimColor(c.hex, 0.15)}; color: ${c.hex};">3 tools + AI</span>
            <span class="demo-zone" style="background: rgba(249,115,22,0.15); color: #f59e0b;">AI analysts</span>
          </div>
        </div>

        <!-- Right: CLI / ASCII -->
        <div class="demo-panel">
          <div class="demo-label">CLI Output</div>

          <div class="demo-ascii" style="color: ${c.hex};">                                  ___/|
                      ___________/    |
           __________/                |
       ___/    _____                  |
   ___/   \\___/     \\                 |
___/                  \\         ______/
        _              \\______/
     __/ \\__    ___----~
,__-~      \\--~</div>

          <div class="demo-findings">
  <span style="color: #22c55e;">[OK]</span> Cloning repository (hardened)
  <span style="color: #22c55e;">[OK]</span> Vulnerability scanners (5 tools)
  <span style="color: ${c.hex};">[..]</span> AI analyst panel (8 analysts)

  <span style="color: #6b7280;">────────────────────────────────</span>

  <span style="color: #ef4444;">[CRITICAL]</span> CVE-2026-1234 in <span style="color: #fafafa;">lodash@4.17.20</span>
             EPSS: 0.94 | In CISA KEV

  <span style="color: #f59e0b;">[HIGH]</span> Maintainer changed on <span style="color: #fafafa;">colors@1.5.0</span>
         Flagged by: <span style="color: ${c.hex};">Investigator</span>

  Report: <span style="color: ${c.hex};">./thresher-reports/example/</span>

  <span style="color: ${c.hex};">~~~~~~~~~~~_/|~~~~~~~~~~~~~~~~~~~~~</span>
          </div>
        </div>
      </div>

      <div class="color-bottom">
        <div class="demo-label">Full Terminal Preview</div>
        <div class="demo-terminal">
          <div class="demo-term-bar">
            <div class="demo-term-dot"></div>
            <div class="demo-term-dot"></div>
            <div class="demo-term-dot"></div>
            <span class="demo-term-title">thresher scan</span>
          </div>
          <div class="demo-term-body"><span style="color: #6b7280;">$</span> thresher scan <span style="color: ${c.hex};">https://github.com/example/repo</span>

  <span style="color: ${c.hex};">                     _/|</span>
  <span style="color: ${c.hex};">              ______/  |</span>           <span style="color: #fafafa; font-weight: 700;">T H R E S H E R</span>
  <span style="color: ${c.hex};">        _____/  __     |</span>
  <span style="color: ${c.hex};">    ___/   \\__/  \\    /</span>           <span style="color: #6b7280;">v2.0.0 | thresher.sh</span>
  <span style="color: ${c.hex};">   /    _     \\__/</span>
  <span style="color: ${c.hex};">  | __-~ \\--~</span>
  <span style="color: ${c.hex};">   \\/</span>

  <span style="color: #22c55e;">[OK]</span> Cloning repository          <span style="color: #22c55e;">[OK]</span> Supply chain analysis
  <span style="color: #22c55e;">[OK]</span> Resolving dependencies       <span style="color: #22c55e;">[OK]</span> Malware detection
  <span style="color: #22c55e;">[OK]</span> Vulnerability scanners       <span style="color: ${c.hex};">[..]</span> AI analyst panel
  <span style="color: #22c55e;">[OK]</span> Static analysis

  <span style="color: #ef4444;">P0</span>  <span style="color: #ef4444;">CRIT</span>  <span style="color: #f59e0b;">HIGH</span>  <span style="color: #f59e0b;">MED</span>   <span style="color: #6b7280;">LOW</span>
   0     2      5     12    23

  Report: <span style="color: ${c.hex};">./thresher-reports/example-repo-20260401/</span>
  <span style="color: ${c.hex};">~~~~~~~~~~~_/|~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~</span></div>
        </div>
      </div>
    `;
    document.body.appendChild(el);
  });
});
</script>

</body>
</html>
