<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Thresher Shark Logo — Minimal silhouette, white on transparent -->
  <!-- The elongated tail fin is the signature element -->

  <!-- Main body -->
  <path d="
    M 80 280
    C 80 280, 100 230, 160 210
    C 220 190, 280 185, 320 190
    C 360 195, 390 210, 410 230
    C 430 250, 435 270, 430 290
    C 425 310, 400 330, 370 340
    C 340 350, 300 350, 260 345
    C 220 340, 180 320, 140 300
    C 100 280, 80 280, 80 280
    Z
  " fill="#fafafa"/>

  <!-- Elongated upper tail fin — the brand signature -->
  <path d="
    M 80 280
    C 70 270, 50 240, 40 200
    C 30 160, 25 120, 30 80
    C 35 50, 50 30, 70 20
    C 75 18, 80 22, 78 30
    C 70 60, 68 100, 72 140
    C 76 180, 85 220, 95 260
    C 100 275, 90 280, 80 280
    Z
  " fill="#fafafa"/>

  <!-- Lower tail fin -->
  <path d="
    M 80 280
    C 75 290, 65 310, 60 330
    C 55 345, 58 348, 65 340
    C 72 330, 80 310, 85 290
    Z
  " fill="#fafafa"/>

  <!-- Dorsal fin -->
  <path d="
    M 240 190
    C 235 170, 225 140, 220 120
    C 218 110, 222 108, 228 115
    C 240 135, 260 165, 270 185
    Z
  " fill="#fafafa"/>

  <!-- Pectoral fin -->
  <path d="
    M 300 310
    C 305 330, 310 360, 308 380
    C 307 385, 303 383, 302 375
    C 298 355, 292 330, 290 310
    Z
  " fill="#fafafa"/>

  <!-- Eye -->
  <circle cx="385" cy="260" r="8" fill="#0a0a0a"/>

  <!-- Mouth line -->
  <path d="
    M 430 285
    C 420 290, 400 295, 385 292
  " stroke="#0a0a0a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Gill slits -->
  <line x1="355" y1="255" x2="350" y2="275" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round"/>
  <line x1="345" y1="253" x2="340" y2="273" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round"/>
  <line x1="335" y1="252" x2="330" y2="272" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round"/>
</svg>
